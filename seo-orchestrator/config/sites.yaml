# ============================================================
# SEO Orchestrator — Site Configuration
# ============================================================

orchestrator:
  max_actions_per_run: 10        # Cap auto-actions per daily run
  risk_level: conservative       # conservative | aggressive
  human_review_threshold: high   # low = review everything, high = only money pages
  output_dir: ./outputs
  log_retention_days: 90

sites:
  - hostname: luminaclippers.com
    type: framer
    priority: 1                  # Lower = higher priority
    description: "Lumina Clipping Agency — short-form content distribution"
    github: "https://github.com/RhysMckay7777/luminaclippers-site"
    searchatlas:
      rank_tracker_project_id: 70664
      site_audit_id: 116665
      otto_project_uuid: "6bef1a80-9a02-4969-b84b-42def0a6f238"
      otto_project_id: 78296
      knowledge_graph_id: 608151
      gsc_connected: true
      ga_connected: false
    target_regions:
      - country: us
        language: english
    priority_keywords:
      - "clipping agency"
      - "content clipping service"
      - "short form content agency"
      - "video clipping agency"
      - "tiktok clipping service"
      - "ugc clipping service"
      - "social media clipping agency"
    money_pages:
      - "/"
      - "/services"
      - "/pricing"
    cms:
      type: framer
      # Blog content managed in Framer CMS — articles provided as markdown for manual paste
      # GitHub repo: https://github.com/RhysMckay7777/luminaclippers-site

  - hostname: luminaweb3.io
    type: nextjs
    priority: 2
    description: "Lumina Web3 — crypto/Web3 marketing agency"
    github: "https://github.com/RhysMckay7777/luminaweb3-site"
    searchatlas:
      rank_tracker_project_id: 69275
      site_audit_id: 114531
      otto_project_uuid: "b3ba4228-c4fe-46ef-bceb-d4dd769faa85"
      otto_project_id: 76313
      knowledge_graph_id: 611385
      gsc_connected: true
      ga_connected: false
    target_regions:
      - country: us
        language: english
      - country: ae
        language: english
    priority_keywords:
      - "web3 marketing agency"
      - "crypto marketing agency"
      - "blockchain marketing agency"
      - "web3 pr agency"
      - "crypto influencer marketing"
      - "blockchain content marketing"
    money_pages:
      - "/"
      - "/services"
      - "/case-studies"
    cms:
      content_dir: "./content"   # JSON/YAML content folder
      # GitHub repo: https://github.com/RhysMckay7777/luminaweb3-site
      # For blog: Next.js app on Vercel, revalidation via API

# ============================================================
# Environment Variables Required (set before running):
# ============================================================
# SEARCHATLAS_API_KEY         — SearchAtlas API key
# WP_CLIPPERS_USER            — WordPress username for luminaclippers.com
# WP_CLIPPERS_APP_PASSWORD    — WordPress application password
# LUMINAWEB3_REVALIDATION_SECRET — Next.js ISR revalidation secret
